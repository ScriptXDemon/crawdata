# ═══════════════════════════════════════════════════════════════════════════
#  Mallory — FULL stack in Docker (all dashboards + data services).
#  Run from repo root:  docker compose -f docker-compose.full.yml up -d --build
#
#  Services (host ports):
#    postgres  :5433   ·  minio :9000 (console :9001)
#    l2        :8000   ·  crawler-api :8099  ·  ingest :9090  ·  client :5173
#
#  Inter-service URLs use CONTAINER NAMES (not localhost) — that's the whole point
#  of a shared compose network. LLM = the remote Ollama farm (reachable from
#  containers, unlike a host-local ollama). Embeddings are OFF in-container
#  (no local ollama reachable); deterministic corroboration still works.
#
#  Set the farm key once:  export OLLAMA_API_KEY=sk-farm-...   (or put it in a .env
#  file next to this compose). Never bake it into the image.
# ═══════════════════════════════════════════════════════════════════════════
name: mallory

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mallory
      POSTGRES_PASSWORD: mallory
      POSTGRES_DB: mallory
    ports: ["5433:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mallory"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mallory
      MINIO_ROOT_PASSWORD: mallory123
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]
    healthcheck:
      test: ["CMD-SHELL", "mc alias set h http://localhost:9000 mallory mallory123 && mc ready h || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: create the mallory-raw bucket, then exit.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      sh -c "until mc alias set local http://minio:9000 mallory mallory123; do sleep 2; done &&
             mc mb -p local/mallory-raw || true &&
             mc anonymous set download local/mallory-raw || true &&
             echo 'bucket ready'"
    restart: "no"

  # ── L2 intelligence (8000) — Postgres + MinIO + Ollama farm ──
  l2:
    build: ./layer2-data-engine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://mallory:mallory@postgres:5432/mallory
      LLM_PROVIDER: ollama
      # Default brain = the remote Ollama FARM (serves text-model + vlm-model). Flip to LOCAL
      # live — no restart — from the crawler dashboard toggle (POST /ops/llm/switch?mode=local),
      # or override OLLAMA_BASE_URL here. The farm KEY comes from the repo-root .env (gitignored).
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-https://ollama.i3softlab.com/v1}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      OLLAMA_MODEL_FAST: ${OLLAMA_MODEL_FAST:-text-model}
      OLLAMA_MODEL_DEEP: ${OLLAMA_MODEL_DEEP:-text-model}
      OLLAMA_MODEL_VISION: ${OLLAMA_MODEL_VISION:-vlm-model}
      # Embeddings have NO farm model, so they always run on local Ollama (via host.docker.internal).
      OLLAMA_EMBED_BASE_URL: http://host.docker.internal:11434/v1
      OLLAMA_MODEL_EMBED: nomic-embed-text
      LLM_TIMEOUT_S: "45"            # farm answers ~3s but has slow tails; fail stuck calls fast
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: mallory
      MINIO_SECRET_KEY: mallory123
      MINIO_BUCKET: mallory-raw
      SEED_DIR: ./seed_data
      SCHEDULER_ENABLED: "0"
      # Allow the client (5173) AND the crawler dashboards (8098/8099) to call L2 from the
      # browser — the "Process in L2" button on the crawler dashboard is a cross-origin fetch.
      CORS_ORIGINS: http://localhost:5173,http://localhost:8099,http://localhost:8098,http://127.0.0.1:8099,http://127.0.0.1:8098,http://127.0.0.1:5173
    # Map host.docker.internal to the host so the container reaches local Ollama on :11434.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports: ["8000:8000"]
    command: >
      sh -c "python -m mallory_engine.scripts.init_db &&
             python -m mallory_engine.scripts.load_seed &&
             uvicorn mallory_engine.main:app --host 0.0.0.0 --port 8000"

  # ── Crawler API (8099) — paste jobs here; forwards to ingest + L2 ──
  crawler-api:
    build: ./cralwer
    # tini as PID 1 reaps zombie Chromium children — the async pool spawns/kills many
    # browsers per batch, and without an init they pile up as <defunct> and exhaust PIDs.
    init: true
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      CRAWLER_API_PORT: "8099"
      CRAWLER_ALLOW_NETWORK: "1"
      CRAWLER_PREFER_FIXTURES: "0"
      # Async multi-tab browser-pool engine (the sole engine) — one shared pool across the whole
      # batch, saturates the box. Tuned from scripts/bench_engine.py: 8 browsers x 12 tabs = 96
      # concurrent tabs hit ~86% CPU (sweet spot before RAM pressure on the 33GB WSL2-capped
      # container). Per-host concurrency 3 keeps 96 tabs from ever hammering one site.
      CRAWLER_BROWSERS: "8"
      CRAWLER_TABS_PER_BROWSER: "12"
      # Per-host concurrency is ADAPTIVE by default (do NOT pin CRAWLER_HOST_CONCURRENCY):
      # the 96-tab pool is spread across the batch's distinct seed hosts, so a 1-job
      # single-domain crawl fans out to ~ceil tabs on that host instead of idling 93 tabs,
      # while a 38-host batch drops back to the polite floor. Setting CRAWLER_HOST_CONCURRENCY
      # pins it to a fixed value (disables adaptation). Floor/ceiling bound the spread;
      # .gov/.mil careful hosts still force concurrency 1 regardless.
      CRAWLER_HOST_CONCURRENCY_FLOOR: "3"
      CRAWLER_HOST_CONCURRENCY_CEIL: "24"
      CRAWLER_HOST_DELAY: "1.0"
      # IP-blocked hosts (war.gov etc.): route Chromium through a RESIDENTIAL/mobile
      # proxy gateway (the provider rotates the exit IP per request). Empty = direct
      # (current behaviour). Datacenter proxies DON'T work — same blocklists as a server.
      # Format: http://user:pass@gateway.provider.com:7777  (or socks5://)
      CRAWLER_PROXY_URL: "${CRAWLER_PROXY_URL:-}"
      # DVIDS API key (free signup) — unlocks the official DoD news/press JSON API,
      # the sanctioned WAF-free path for war.gov/defense.gov. Empty = API path skipped
      # (Wayback + RSS still cover it). Get a key at https://api.dvidshub.net/docs
      DVIDS_API_KEY: "${DVIDS_API_KEY:-}"
      # C3 CamoFox stealth engine — the WAF-block fallback. ON by default (the camofox service
      # is part of this stack); it routes robots-denied + WAF-blocked hosts through the stealth
      # browser. Bring the service up with `--profile camofox`. When off/unreachable the fallback
      # ladder cleanly skips to Wayback/feed. Set CAMOFOX_ENABLED=0 to disable.
      CAMOFOX_ENABLED: "${CAMOFOX_ENABLED:-1}"
      CAMOFOX_URL: http://camofox:9377
      # Bearer key for CamoFox's /evaluate (raw-HTML grab → full asset capture). Must match
      # the key on the camofox service below.
      CAMOFOX_API_KEY: "${CAMOFOX_API_KEY:-mallory-camofox-key}"
      # A 32-job x 500-page render-everything batch needs more than the 30-min default.
      # 2h wall-clock; the 120s idle watchdog still stops early if the frontier drains.
      CRAWLER_ENGINE_WALL_CLOCK_S: "7200"
      INGEST_BASE_URL: http://ingest:9090          # default forward target (container name)
      L2_INGEST_URL: http://l2:8000                # where the crawler reaches L2 (container name)
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: mallory
      MINIO_SECRET_KEY: mallory123
      MINIO_BUCKET: mallory-raw
    ports: ["8099:8099"]
    command: ["python", "run.py", "crawler-api"]

  # ── Ingest dashboard (9090) — raw harvested pages ──
  ingest:
    build: ./cralwer
    init: true
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: mallory
      MINIO_SECRET_KEY: mallory123
      MINIO_BUCKET: mallory-raw
    ports: ["9090:9090"]
    command: ["python", "run.py", "serve"]

  # ── C3 CamoFox stealth browser (9377) — anti-detection WAF bypass ──
  # Opt-in: only starts with `docker compose --profile camofox up`. jo-inc/camofox-browser is
  # a standalone Camoufox (Firefox-fork) server with a REST API on :9377; the crawler calls it on
  # demand (see crawler/camofox_client.py) when CAMOFOX_ENABLED=1.
  # Builds from the vendored clone (git clone ...camofox-browser vendor/camofox-browser). The
  # Camoufox binary + yt-dlp must be fetched into vendor/camofox-browser/dist/ first (the repo's
  # `make fetch` step) — the Dockerfile bind-mounts dist/ during build.
  camofox:
    profiles: ["camofox"]
    image: ${CAMOFOX_IMAGE:-camofox-browser:local}
    # Auto-recover: a Node OOM is a SIGABRT that bypasses the JS uncaughtException handler, so
    # the container just dies. Without this the whole C3 path silently goes "down" mid-batch.
    restart: unless-stopped
    # Hard ceiling so a camofox leak can't OOM-cascade and take crawler-api/l2/ingest down with it
    # (that happened once). 4g > the 2g Node heap, leaving room for the Firefox contexts themselves.
    mem_limit: 4g
    build:
      context: ./vendor/camofox-browser
      args:
        ARCH: x86_64
        CAMOUFOX_VERSION: "135.0.1"
        CAMOUFOX_RELEASE: beta.24
    environment:
      CAMOFOX_PORT: "9377"
      # Enables the Bearer-gated /evaluate endpoint (raw-HTML grab). Must match crawler-api.
      CAMOFOX_API_KEY: "${CAMOFOX_API_KEY:-mallory-camofox-key}"
      # Node heap: the image ships with --max-old-space-size=128 (128 MB) which OOM-crashes
      # (SIGABRT) under a real batch — full-page screenshots + several live Firefox contexts
      # blow past it. The CMD reads MAX_OLD_SPACE_SIZE, so raise it to 2 GB with no rebuild.
      MAX_OLD_SPACE_SIZE: "${CAMOFOX_HEAP_MB:-2048}"
      # Session/tab caps REJECT (503) rather than evict, so a LOW cap + short idle-TTL is what
      # actually bounds live contexts. The crawler rotates a small userId pool (CRAWLER_CAMOFOX_POOL,
      # default 4), so ≤8 sessions is ample headroom; high caps just let leaked contexts pile up.
      MAX_SESSIONS: "${CAMOFOX_MAX_SESSIONS:-8}"
      MAX_TABS_GLOBAL: "${CAMOFOX_MAX_TABS:-12}"
      SESSION_TIMEOUT_MS: "${CAMOFOX_SESSION_TIMEOUT_MS:-180000}"
      TAB_INACTIVITY_MS: "${CAMOFOX_TAB_INACTIVITY_MS:-120000}"
      # ── Residential/mobile BACKCONNECT proxy → auto-enables Camoufox geoip (timezone/locale/
      # geolocation spoofed to the exit IP, coherent per-session fingerprint). WITHOUT a proxy,
      # geoip is off and every render exits this datacenter IP with an identical SF fingerprint —
      # a WAF tell. Datacenter proxies DON'T help (same blocklists). Fill these from a residential
      # provider (Decodo/BrightData/Oxylabs/IPRoyal) to harden C3; empty = direct (current behaviour).
      PROXY_STRATEGY: "${CAMOFOX_PROXY_STRATEGY:-}"          # set to "backconnect" to enable
      PROXY_BACKCONNECT_HOST: "${CAMOFOX_PROXY_HOST:-}"
      PROXY_BACKCONNECT_PORT: "${CAMOFOX_PROXY_PORT:-7000}"
      PROXY_USERNAME: "${CAMOFOX_PROXY_USER:-}"
      PROXY_PASSWORD: "${CAMOFOX_PROXY_PASS:-}"
      PROXY_COUNTRY: "${CAMOFOX_PROXY_COUNTRY:-}"            # e.g. "us"/"in" to fix the geo
    ports: ["9377:9377"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9377/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── React client (5173) — served by nginx, proxies /api + /ops to l2 ──
  client:
    build:
      context: ./layer3-client
    depends_on: [l2]
    ports: ["5173:80"]
    environment:
      # nginx.conf proxies /api and /ops to this upstream (the l2 container).
      L2_UPSTREAM: http://l2:8000

volumes:
  pgdata:
  miniodata:
