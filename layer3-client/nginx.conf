server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy the L2 serving API to the l2 container (same-origin for the browser),
    # mirroring the vite dev proxy (/api + /ops -> :8000). The resolver lets nginx
    # start before l2 is up (docker's embedded DNS lives at 127.0.0.11).
    # IMPORTANT: proxy_pass must use a VARIABLE ($l2), not a literal host. A literal
    # `proxy_pass http://l2:8000` resolves ONCE at startup and caches the IP forever, so a
    # container rebuild (new IP) → 502. A variable forces per-request re-resolution via `resolver`.
    resolver 127.0.0.11 valid=10s;
    set $l2 http://l2:8000;
    location /api/ { proxy_pass $l2; proxy_set_header Host $host; }
    location /ops/ { proxy_pass $l2; proxy_set_header Host $host; }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
