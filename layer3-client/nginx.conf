server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy the L2 serving API to the l2 container (same-origin for the browser),
    # mirroring the vite dev proxy (/api + /ops -> :8000). The resolver lets nginx
    # start before l2 is up (docker's embedded DNS lives at 127.0.0.11).
    resolver 127.0.0.11 valid=10s;
    location /api/ { proxy_pass http://l2:8000; proxy_set_header Host $host; }
    location /ops/ { proxy_pass http://l2:8000; proxy_set_header Host $host; }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
